<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ammar Malick - Software Engineer & AI Builder">
  <defs>
    <radialGradient id="bg" cx="15%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#20173f"/>
      <stop offset="50%" stop-color="#090a13"/>
      <stop offset="100%" stop-color="#05050c"/>
    </radialGradient>
    <linearGradient id="gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93f6ff"/>
      <stop offset="45%" stop-color="#ffaef5"/>
      <stop offset="90%" stop-color="#b2a0ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="48" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft orbs -->
  <g opacity="0.35" filter="url(#glow)">
    <circle cx="100" cy="120" r="180" fill="#6f43ff"/>
    <circle cx="1100" cy="180" r="150" fill="#00d8ff"/>
    <circle cx="960" cy="560" r="160" fill="#ff4ecd"/>
  </g>

  <!-- Dot grid -->
  <g fill="rgba(255,255,255,0.08)">
    <rect x="60" y="60" width="2" height="2"/>
    <rect x="120" y="60" width="2" height="2"/>
    <rect x="180" y="60" width="2" height="2"/>
  </g>

  <!-- AM monogram -->
  <g transform="translate(80,80)">
    <rect width="60" height="60" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="30" y="40" text-anchor="middle" font-family="Space Grotesk, Inter, sans-serif" font-size="24" font-weight="900" fill="#f5f8ff" letter-spacing="2">AM</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#95a6e5" letter-spacing="4">SOFTWARE ENGINEER &#8226; AI BUILDER</text>

  <!-- Headline -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="76" font-weight="900" fill="#f5f8ff">I build</text>
  <text x="80" y="420" font-family="Inter, sans-serif" font-size="76" font-weight="900" fill="url(#gradient)">real-world software</text>
  <text x="80" y="510" font-family="Inter, sans-serif" font-size="76" font-weight="900" fill="#f5f8ff">with measurable impact.</text>

  <!-- Name + stat line -->
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#a5adcf">Ammar Malick &#8226; UTA Honors &#8226; 3.93 GPA &#8226; 840+ contributions</text>
</svg>
